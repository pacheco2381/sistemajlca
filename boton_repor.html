    <script>
        function cargarUsuarioLogueado() {
            fetch('get_user.php')
                .then(response => response.json())
                .then(data => {
                    if (data.logged_in) {
                        // Cargar el nombre recuperado de la sesión
                        document.getElementById('user-name').textContent = data.nombre;
                        document.getElementById('user-display').style.display = 'flex';
                    } else {
                        // Si expiró o no existe la sesión, mandar a login
                        window.location.href = 'login.php';r
                    }
                })
                .catch(error => {
                    console.error('Error al obtener los datos de la sesión:', error);
                });
        }

        // Ejecutar en cuanto el árbol DOM esté completamente construido
        document.addEventListener('DOMContentLoaded', cargarUsuarioLogueado);
    </script>
